<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gift Details</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #f8f5f1;
      color: #3b3b3b;
      line-height: 1.7;
    }

    main {
      max-width: 750px;
      margin: auto;
      padding: 60px 20px;
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      margin-bottom: 30px;
    }

    h1, h2 {
      color: #5c4b43;
    }

    .info-box {
      background: #f2efea;
      padding: 18px;
      border-radius: 12px;
      margin-top: 15px;
      word-break: break-word;
    }

    img {
      width: 220px;
      border-radius: 12px;
      margin-top: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }

    input,
    textarea {
      padding: 14px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
    }

    button {
      background: #5c4b43;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 1rem;
    }

    button:hover {
      background: #3f332d;
    }
  </style>
</head>

<body>

<main>

  <div class="card">

    <p>
      Obrigado por nos presentear com o Café da manhã ♡
    </p>

    <p>
      Thank you for celebrating with us and helping us create memories together.
    </p>

  </div>

  <!-- PIX -->
  <div class="card">

    <h2>Pix</h2>

    <p>Use the Pix key below:</p>

    <div class="info-box">
      yourpix@email.com
    </div>

    <!-- QR CODE -->
    <img src="pix-qrcode.png" alt="Pix QR Code">

  </div>

  <!-- BANK -->
  <div class="card">

    <h2>Bank Transfer</h2>

    <div class="info-box">
      Bank: Nubank<br>
      Name: Your Name<br>
      IBAN: BR00 0000 0000 0000<br>
      SWIFT: NUBKBRSP
    </div>

  </div>

  <!-- REVOLUT -->
  <div class="card">

    <h2>Revolut</h2>

    <div class="info-box">
      @yourrevolutusername
    </div>

  </div>

</main>

</body>
</html>
